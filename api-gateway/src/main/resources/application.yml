server:
  port: 8080

auth:
  demo:
    user: ${DEMO_USER}
    password: ${DEMO_PASSWORD}

crypto:
  engine:
    url: ${CRYPTO_ENGINE_URL:http://crypto-engine:8000}
  algorithm:
    kem-id: ${KEM_ALGORITHM_ID:ML-KEM-768}   # Algorithm Agility — crypto-engine과 동일 값 유지
    dsa-id: ${DSA_ALGORITHM_ID:ML-DSA-65}

spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      okhttp:
        enabled: true

# OkHttpClient 커넥션 풀 — 부하테스트 시나리오별로 값을 바꿔가며 측정
# 시나리오 A (기본): maxIdle=5,  keepAlive=30s
# 시나리오 B (확장): maxIdle=20, keepAlive=60s  (환경변수로 주입)
# 시나리오 C (최소): maxIdle=1,  keepAlive=10s
okhttp:
  pool:
    max-idle-connections: ${OKHTTP_MAX_IDLE:5}
    keep-alive-duration-seconds: ${OKHTTP_KEEP_ALIVE_SEC:30}

feign:
  client:
    config:
      crypto-engine:
        connectTimeout: 2000
        readTimeout: 5000
        loggerLevel: BASIC   # FeignLatencyLogger 활성화 (BASIC = request line + response status + latency)
  micrometer:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      crypto-engine:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slowCallDurationThreshold: 5s

rate-limit:
  max-requests-per-second: ${RATE_LIMIT_RPS:20}

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
