name: pqc-security-project

# ============================================================
# Step 1-A: Docker 보안 기반
#   - cap_drop: ALL (최소 권한 원칙)
#   - security_opt: no-new-privileges:true (전 서비스 일괄, Step 1-C)
#   - DOCKER_CONTENT_TRUST: 이미지 서명 검증
#   - 네트워크 분리: pqc-internal(내부) / pqc-public(외부 노출)
#   - Resource Limits: ${VAR:-기본값} 환경변수 외재화
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # crypto-engine — FastAPI + liboqs (Dockerfile: Step 1-B)
  # ──────────────────────────────────────────────────────────
  crypto-engine:
    build:
      context: ./crypto-engine
    networks:
      - pqc-internal
    ports:
      - "8000:8000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - config/crypto-engine.env
    environment:
      # env_file 기본값을 쉘 환경변수로 override 가능 (Algorithm Agility — Day 8)
      KEM_ALGORITHM_ID: ${KEM_ALGORITHM_ID:-ML-KEM-768}
      DSA_ALGORITHM_ID: ${DSA_ALGORITHM_ID:-ML-DSA-65}
    deploy:
      resources:
        limits:
          cpus: "${CRYPTO_ENGINE_CPU_LIMIT:-1.0}"
          memory: "${CRYPTO_ENGINE_MEM_LIMIT:-512m}"
    healthcheck:
      test: ["CMD", "/venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # api-gateway — Spring Boot (Dockerfile: Step 1-B)
  # ──────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
    networks:
      - pqc-internal
      - pqc-public
    ports:
      - "8080:8080"
      - "8081:8081"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - config/api-gateway.env
    environment:
      # Algorithm Agility — crypto-engine과 동일 값 유지 (Day 8 버그 수정)
      KEM_ALGORITHM_ID: ${KEM_ALGORITHM_ID:-ML-KEM-768}
      DSA_ALGORITHM_ID: ${DSA_ALGORITHM_ID:-ML-DSA-65}
      # Day 9 CI 수정: env_file 보다 명시적으로 주입 (startup profile 보장)
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    deploy:
      resources:
        limits:
          cpus: "${API_GATEWAY_CPU_LIMIT:-0.5}"
          memory: "${API_GATEWAY_MEM_LIMIT:-1024m}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      crypto-engine:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # dashboard — React (Dockerfile: Step 3)
  # ──────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
    networks:
      - pqc-public
    ports:
      - "3000:3000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - config/dashboard.env
    deploy:
      resources:
        limits:
          cpus: "${DASHBOARD_CPU_LIMIT:-0.25}"
          memory: "${DASHBOARD_MEM_LIMIT:-128m}"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # prometheus — 메트릭 수집 (Day 17)
  # ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    networks:
      - pqc-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    deploy:
      resources:
        limits:
          cpus: "${PROMETHEUS_CPU_LIMIT:-0.5}"
          memory: "${PROMETHEUS_MEM_LIMIT:-256m}"
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # grafana — 모니터링 대시보드 (Day 17)
  # ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    networks:
      - pqc-internal
      - pqc-public
    ports:
      - "3001:3000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: "${GRAFANA_CPU_LIMIT:-0.5}"
          memory: "${GRAFANA_MEM_LIMIT:-256m}"
    restart: unless-stopped
    depends_on:
      - prometheus

  # ──────────────────────────────────────────────────────────
  # db — PostgreSQL 17 + su-exec (스키마: Step 1-C, CVE-2025-68121 su-exec 교체)
  # ──────────────────────────────────────────────────────────
  db:
    image: pqc-db:secure
    build:
      context: ./db
      dockerfile: Dockerfile.db
    networks:
      - pqc-internal
    cap_drop:
      - ALL
    cap_add:
      - CHOWN       # init: data 디렉터리 소유권 변경
      - SETUID      # gosu: postgres 유저로 전환
      - SETGID      # gosu: postgres 그룹으로 전환
      - DAC_OVERRIDE # init: 권한 불일치 파일 접근 (보상통제: cap_drop+no-new-priv+uid=70)
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-pqc}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
      POSTGRES_DB: "${POSTGRES_DB:-pqc_db}"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          cpus: "${DB_CPU_LIMIT:-0.5}"
          memory: "${DB_MEM_LIMIT:-256m}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pqc} -d ${POSTGRES_DB:-pqc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

# ============================================================
# Networks
#   pqc-internal: internal: true → 외부 인터넷 차단
#                 crypto-engine ↔ api-gateway ↔ db 전용
#   pqc-public:   외부 노출 — api-gateway(8080) + dashboard(3000)
# ============================================================
networks:
  pqc-internal:
    driver: bridge
    internal: true
  pqc-public:
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  db-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
