        run: DOCKER_CONTENT_TRUST=0 docker build -t pqc-db:secure -f db/Dockerfile.db ./db

      - name: api-gateway Docker 빌드 (compose 이미지명으로 태깅)
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          load: true
          tags: pqc-security-project-api-gateway:latest

      - name: .env + config/*.env 생성
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=pqc_test/' .env
          cp config/crypto-engine.env.example config/crypto-engine.env
          sed -i 's/^KEM_WRAP_KEY=.*/KEM_WRAP_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=/' config/crypto-engine.env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=pqc_test/' config/crypto-engine.env
          sed -i '/^DSA_SECRET_KEY_B64=/d' config/crypto-engine.env
          sed -i '/^DSA_PUBLIC_KEY_B64=/d' config/crypto-engine.env
          cp config/api-gateway.env.example config/api-gateway.env
          cp config/dashboard.env.example config/dashboard.env
          echo "DEMO_USER=demo" >> config/api-gateway.env
          echo "DEMO_PASSWORD=demo123" >> config/api-gateway.env

      - name: "[Day8-AC1] ML-KEM-512로 스택 기동 (환경변수 전환, 재빌드 없음)"
        run: |
          KEM_ALGORITHM_ID=ML-KEM-512 \
            docker compose --env-file .env up -d --no-build --wait --wait-timeout 240 \
            db crypto-engine api-gateway

      - name: "[AC3] docker logs 진단 (항상 출력)"
        if: always()
        run: |
          echo "=== crypto-engine logs ===" && docker compose logs crypto-engine --tail=30
          echo "=== api-gateway logs ===" && docker compose logs api-gateway --tail=40

      - name: "[Day8-AC1] POST /api/auth/login → JWT 발급"
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"userId":"demo","password":"demo123"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: "[Day8-AC1] /api/encrypt → algorithm: ML-KEM-512 확인"
        run: |
          PLAIN=$(python3 -c "import base64; print(base64.b64encode(b'agility-test').decode())")
          RESP=$(curl -sf -X POST http://localhost:8080/api/encrypt \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"plaintext\":\"$PLAIN\"}")
          echo "$RESP"
          python3 -c "
          import json, sys
          r = json.loads('$RESP')
          assert r.get('algorithm') == 'ML-KEM-512', f'FAIL: algorithm={r.get(\"algorithm\")}'
          print('PASS ✓ — ML-KEM-512 전환 후 /api/encrypt 200 + algorithm 확인')
          " || exit 1
          echo "ENCRYPT_RESP=$(echo "$RESP" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin)))")" >> $GITHUB_ENV

      - name: "[Day8-AC1] /kem/decrypt → plaintext 원문 일치 (왕복 200)"
        run: |
          python3 -c "
          import os, json, urllib.request, base64
          enc = json.loads(os.environ['ENCRYPT_RESP'])
          body = json.dumps({
              'key_id': enc['key_id'],
              'kem_ciphertext': enc['kem_ciphertext'],
              'aes_ciphertext': enc['aes_ciphertext'],
              'aes_iv': enc['aes_iv'],
          }).encode()
          req = urllib.request.Request(
              'http://localhost:8080/kem/decrypt',
              data=body,
              headers={'Content-Type': 'application/json',
                       'Authorization': 'Bearer ' + os.environ['TOKEN']},
              method='POST',
          )
          r = json.loads(urllib.request.urlopen(req, timeout=10).read())
          decoded = base64.b64decode(r['plaintext'])
          assert decoded == b'agility-test', f'FAIL: {decoded}'
          print('PASS ✓ — ML-KEM-512 왕복 복호화 원문 일치')
          "

      - name: "[Day8-AC1] /kem/encrypt 헤더 불일치 → 400 확인"
        # pqc-internal 네트워크는 internal:true → 호스트에서 포트 바인딩 불가
        # crypto-engine 컨테이너 내부에서 직접 HTTP 요청으로 대체
        run: |
          docker compose exec -T crypto-engine python3 -c "
          import urllib.request, urllib.error, json, base64
          # ML-KEM-512 key_id 생성
          req = urllib.request.Request('http://localhost:8000/kem/init',
              data=b'{}',
              headers={'Content-Type': 'application/json', 'X-Kem-Algorithm-Id': 'ML-KEM-512'},
              method='POST')
          init = json.loads(urllib.request.urlopen(req, timeout=10).read())
          key_id = init['key_id']
          # ML-KEM-768 헤더로 encrypt 시도 → 400 기대
          plain = base64.b64encode(b'mismatch-test').decode()
          body = json.dumps({'key_id': key_id, 'plaintext': plain}).encode()
          req2 = urllib.request.Request('http://localhost:8000/kem/encrypt',
              data=body,
              headers={'Content-Type': 'application/json', 'X-Kem-Algorithm-Id': 'ML-KEM-768'},
              method='POST')
          try:
              urllib.request.urlopen(req2, timeout=10)
              print('FAIL: expected 400 but got 200')
              exit(1)
          except urllib.error.HTTPError as e:
              assert e.code == 400, f'FAIL: expected 400, got {e.code}'
              print('PASS: header mismatch -> 400')
          "

      - name: "[Day8-AC1] /kem/encrypt 헤더 없음 → DB algorithm_id 기반 200"
        # pqc-internal 네트워크는 internal:true → 호스트에서 포트 바인딩 불가
        # crypto-engine 컨테이너 내부에서 직접 HTTP 요청으로 대체
        run: |
          docker compose exec -T crypto-engine python3 -c "
          import urllib.request, json, base64
          # ML-KEM-512 key_id 생성
          req = urllib.request.Request('http://localhost:8000/kem/init',
              data=b'{}',
              headers={'Content-Type': 'application/json', 'X-Kem-Algorithm-Id': 'ML-KEM-512'},
              method='POST')
          init = json.loads(urllib.request.urlopen(req, timeout=10).read())
          key_id = init['key_id']
          # 헤더 없이 encrypt → stored_algorithm(ML-KEM-512) 기반 200 기대
          plain = base64.b64encode(b'no-header-test').decode()
          body = json.dumps({'key_id': key_id, 'plaintext': plain}).encode()
          req2 = urllib.request.Request('http://localhost:8000/kem/encrypt',
              data=body,
              headers={'Content-Type': 'application/json'},
              method='POST')
          r = json.loads(urllib.request.urlopen(req2, timeout=10).read())
          assert r['algorithm'] == 'ML-KEM-512', f'FAIL: algorithm={r[\"algorithm\"]}'
          print('PASS: no-header -> DB algorithm_id(ML-KEM-512) 200')
          "

      - name: "[Day10-AC1] cbom_assets.algorithm_id = ML-KEM-512 DB assertion"
        run: |
          COUNT=$(docker compose exec -T db psql -U pqc -d pqc_db -t -c \
            "SELECT COUNT(*) FROM cbom_assets WHERE algorithm_id = 'ML-KEM-512';" \
            | tr -d ' ')
          echo "cbom_assets ML-KEM-512 rows: $COUNT"
          python3 -c "
          count = int('$COUNT')
          assert count > 0, f'FAIL: cbom_assets에 ML-KEM-512 이력 없음 (count={count})'
          print(f'PASS ✓ — cbom_assets.algorithm_id=ML-KEM-512 전환 이력 확인 ({count} rows)')
          " || exit 1

      - name: "[Day10-R1] AlgorithmAdminEndpoint 포트 8081 노출 확인 (GET /actuator/algorithm)"
        run: |
          RESP=$(docker compose exec -T api-gateway \
            curl -sf http://localhost:8081/actuator/algorithm)
          echo "GET /actuator/algorithm: $RESP"
          python3 -c "
          import json
          r = json.loads('$RESP')
          assert 'kemId' in r and 'dsaId' in r, f'FAIL: 필드 누락 — {r}'
          print(f'PASS ✓ — 포트 8081 AlgorithmAdminEndpoint 정상 응답: kemId={r[\"kemId\"]}, dsaId={r[\"dsaId\"]}')
          " || exit 1

      - name: "[Day10-R1] Hot-swap — ML-KEM-512 → ML-KEM-768 (재기동 없음)"
        run: |
          # 컨테이너 내부에서 management 포트(8081) 호출 — 외부 미노출 포트 (보안 설계)
          RESP=$(docker compose exec -T api-gateway \
            curl -sf -X POST http://localhost:8081/actuator/algorithm \
            -H "Content-Type: application/json" \
            -d '{"kemId":"ML-KEM-768"}')
          echo "Hot-swap response: $RESP"
          python3 -c "
          import json
          r = json.loads('$RESP')
          assert r.get('kemId') == 'ML-KEM-768', f'FAIL: kemId={r.get(\"kemId\")}'
          print('PASS ✓ — Hot-swap admin API: ML-KEM-512 → ML-KEM-768 전환 확인')
          " || exit 1

      - name: "[Day10-R1] Hot-swap 적용 후 /api/encrypt → algorithm: ML-KEM-768 확인"
        run: |
          PLAIN=$(python3 -c "import base64; print(base64.b64encode(b'hotswap-verify').decode())")
          RESP=$(curl -sf -X POST http://localhost:8080/api/encrypt \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"plaintext\":\"$PLAIN\"}")
          echo "$RESP"
          python3 -c "
          import json, sys
          r = json.loads('$RESP')
          assert r.get('algorithm') == 'ML-KEM-768', \
            f'FAIL: Hot-swap 미적용 — algorithm={r.get(\"algorithm\")}'
          print('PASS ✓ — 재기동 없이 Hot-swap 후 /api/encrypt algorithm=ML-KEM-768 확인')
          " || exit 1

      - name: "[Day10-R1] Hot-swap 불허용 값 → 400 확인"
        run: |
          STATUS=$(docker compose exec -T api-gateway \
            curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8081/actuator/algorithm \
            -H "Content-Type: application/json" \
            -d '{"kemId":"RSA-2048"}')
          echo "불허용 알고리즘 응답 코드: $STATUS"
          [ "$STATUS" = "400" ] && echo "PASS ✓ — 불허용 값 → 400 정상 거부" || \
            (echo "FAIL: 기대 400, 실제 $STATUS"; exit 1)

  # ── Phase 2 Gate (Day 10 — AC2) ─────────────────────────────
  phase2-complete:
    name: "Phase 2 완료 Gate — 전체 잡 집약"
    runs-on: ubuntu-latest
    needs:
      - trivy
      - build-and-trivy
      - api-gateway-build
      - unit-test
      - stack-integration-test
      - auth-integration-test
      - sndl-routing-test
      - algorithm-agility-test
      - compose-integration
    steps:
      - name: Phase 2 모든 잡 통과 확인
        run: |
          echo "✅ Phase 2 전체 잡 green — phase2-complete gate 통과"
          echo "포함 잡: trivy, build-and-trivy, api-gateway-build, unit-test,"
          echo "         stack-integration-test, auth-integration-test,"
          echo "         sndl-routing-test, algorithm-agility-test, compose-integration"
