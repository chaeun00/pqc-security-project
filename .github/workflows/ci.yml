# ==============================================================
# CI — Step 1-A~1-C 통합
# rev.7: DCT(Notary v1) → Cosign(Sigstore) keyless verify 전환
# 2026-03-05: build-and-trivy / integration-test / db-schema-test 추가
# ==============================================================
name: PQC Security CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── test-dct (Cosign keyless verify) ──────────────────────
  test-dct:
    name: Cosign 이미지 서명 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cosign 설치
        uses: sigstore/cosign-installer@v3.7.0

      - name: "[Stage 1-1] OCI 서명 레이어 확인: cgr.dev/chainguard/postgres:latest"
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "https://github.com/chainguard-images/.*" \
            cgr.dev/chainguard/postgres:latest \
            > /dev/null 2>&1 \
            && echo "PASS ✓ — OCI 서명 레이어 확인" \
            || { echo "FAIL — 서명 레이어 없음"; exit 1; }

      - name: "[Stage 1-2] Sigstore keyless 서명 검증: cgr.dev/chainguard/postgres:latest"
        run: |
          if cosign verify \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --certificate-identity-regexp "https://github.com/chainguard-images/.*" \
              cgr.dev/chainguard/postgres:latest > /dev/null 2>&1; then
            echo "PASS ✓ — keyless 서명 검증 통과"
          else
            echo "FAIL — keyless 서명 검증 실패"
            exit 1
          fi

      - name: "[Stage 2-1] 서명 없음 사전 확인: postgres:16-alpine"
        run: |
          if ! cosign verify postgres:16-alpine > /dev/null 2>&1; then
            echo "PASS ✓ — Cosign 서명 없음 확인 (미서명 대상 적합)"
          else
            echo "FAIL — Cosign 서명 발견 (미서명 테스트 불가)"
            exit 1
          fi

      - name: "[Stage 2-2] cosign verify 거부 확인 + stderr 원인 캡처"
        run: |
          ERR=$(cosign verify postgres:16-alpine 2>&1) && RC=0 || RC=$?
          if [ $RC -ne 0 ]; then
            if echo "$ERR" | grep -qiE "(no matching signatures|no signatures found)"; then
              echo "PASS ✓ — 거부 원인: no matching signatures"
            else
              echo "PASS ✓ — 거부됨. 원인: $(echo "$ERR" | head -1)"
            fi
          else
            echo "FAIL — 미서명 이미지가 검증됨 (예상치 않은 결과)"
            exit 1
          fi

  # ── trivy ─────────────────────────────────────────────────
  trivy:
    name: Trivy Critical 스캔 (pqc-db:secure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: pqc-db:secure 빌드
        run: DOCKER_CONTENT_TRUST=0 docker build -t pqc-db:secure -f db/Dockerfile.db ./db

      - name: Trivy CRITICAL 스캔 (trivy PATH 설치, exit-code 0)
        # trivy v0.69.3 config skip-files 버그: config 방식은 gobinary 스캐너에 미적용
        # → trivy-action으로 바이너리만 설치, 게이트는 아래 CLI --skip-files 플래그 사용
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: pqc-db:secure
          severity: CRITICAL
          exit-code: "0"
          format: table

      - name: Trivy CRITICAL 게이트 (CLI --skip-files, exit-code 1)
        # trivy-action이 trivy를 PATH에 설치 → CLI 직접 호출
        # --skip-files usr/local/bin/gosu: gosu(Go binary) → su-exec(C)로 교체됨, CVE 코드 미존재
        # 경로: leading / 없음 (trivy v0.69.3 컨테이너 경로 표현 방식)
        run: |
          trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            --skip-files usr/local/bin/gosu \
            pqc-db:secure

  # ── build-and-trivy (신규 — Step 1-A, 1-B 커버) ───────────
  build-and-trivy:
    name: crypto-engine 빌드 + Trivy Critical 스캔
    runs-on: ubuntu-latest
    env:
      DOCKER_CONTENT_TRUST: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: crypto-engine 빌드 (GHA 레이어 캐시 적립, --load)
        uses: docker/build-push-action@v6
        with:
          context: ./crypto-engine
          load: true
          tags: pqc-security-project-crypto-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy CRITICAL 스캔 (crypto-engine)
        # ignore-unfixed: true — upstream 미패치 CVE 제외 (alpine 기반, 수정 불가 항목 skip)
        # exit-code: "1" — 패치 가능 CRITICAL 존재 시 빌드 차단 (인수조건 2)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: pqc-security-project-crypto-engine:latest
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

  # ── integration-test (신규 — Step 1-B 커버) ───────────────
  integration-test:
    name: HTTP 왕복 테스트 (KEM/DSA)
    runs-on: ubuntu-latest
    needs: build-and-trivy
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: crypto-engine 빌드 (GHA 캐시 히트, --load)
        uses: docker/build-push-action@v6
        with:
          context: ./crypto-engine
          load: true
          tags: pqc-security-project-crypto-engine:latest
          cache-from: type=gha

      - name: crypto-engine 컨테이너 기동
        run: |
          docker run -d --name crypto-engine \
            -e KEM_ALGORITHM_ID=ML-KEM-768 \
            -e DSA_ALGORITHM_ID=ML-DSA-65 \
            -e LOG_LEVEL=INFO \
            pqc-security-project-crypto-engine:latest

      - name: 헬스체크 대기 (최대 120초)
        run: |
          timeout 120 bash -c '
            until docker exec crypto-engine /venv/bin/python -c \
                "import urllib.request; urllib.request.urlopen('"'"'http://localhost:8000/health'"'"', timeout=5)" 2>/dev/null; do
              echo "대기 중..."
              sleep 5
            done
            echo "crypto-engine healthy ✓"
          '

      - name: HTTP 왕복 테스트 (http_test.py + test_edge.py)
        run: |
          docker cp scripts/http_test.py crypto-engine:/tmp/http_test.py
          docker cp scripts/test_edge.py crypto-engine:/tmp/test_edge.py
          docker exec crypto-engine /venv/bin/python /tmp/http_test.py
          docker exec crypto-engine /venv/bin/python /tmp/test_edge.py
          docker exec --user root crypto-engine rm -f /tmp/http_test.py /tmp/test_edge.py 2>/dev/null || true

  # ── db-schema-test (신규 — Step 1-C 커버) ─────────────────
  db-schema-test:
    name: DB 스키마 검증 (테이블 + 인덱스)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pqc
          POSTGRES_PASSWORD: pqc_test
          POSTGRES_DB: pqc_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pqc -d pqc_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: psql 클라이언트 설치
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: SQL 스키마 적용 (001_schema.sql + 002_vacuum_policy.sql)
        env:
          PGPASSWORD: pqc_test
        run: |
          psql -h localhost -U pqc -d pqc_db -f db/init/001_schema.sql
          psql -h localhost -U pqc -d pqc_db -f db/init/002_vacuum_policy.sql

      - name: 테이블 4개 확인
        env:
          PGPASSWORD: pqc_test
        run: |
          COUNT=$(psql -h localhost -U pqc -d pqc_db -t -A -c \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE';")
          echo "테이블 수: ${COUNT}"
          [ "${COUNT}" -eq 4 ] || { echo "FAIL: 테이블 수 불일치 (기대=4, 실제=${COUNT})"; exit 1; }
          echo "PASS ✓ — 테이블 4개 확인"

      - name: 인덱스 6개 확인 (idx_*)
        env:
          PGPASSWORD: pqc_test
        run: |
          COUNT=$(psql -h localhost -U pqc -d pqc_db -t -A -c \
            "SELECT count(*) FROM pg_indexes WHERE schemaname='public' AND indexname LIKE 'idx_%';")
          echo "인덱스 수: ${COUNT}"
          [ "${COUNT}" -eq 6 ] || { echo "FAIL: 인덱스 수 불일치 (기대=6, 실제=${COUNT})"; exit 1; }
          echo "PASS ✓ — 인덱스 6개 확인"

  # ── inspect-limits (신규 — Step 1-D 커버) ──────────────────
  inspect-limits:
    name: Resource Limits 검증 (check-limits.sh)
    runs-on: ubuntu-latest
    needs: build-and-trivy
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: crypto-engine 빌드 (GHA 캐시 히트, --load)
        uses: docker/build-push-action@v6
        with:
          context: ./crypto-engine
          load: true
          tags: pqc-security-project-crypto-engine:latest
          cache-from: type=gha

      - name: pqc-db:secure 빌드
        run: DOCKER_CONTENT_TRUST=0 docker build -t pqc-db:secure -f db/Dockerfile.db ./db

      - name: .env 생성 (Limit 수치 CI 주입, 민감 값 테스트용 고정)
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=pqc_test/' .env
          # config/*.env: .gitignore(*.env)로 미추적 → example에서 복사
          # docker compose ps 시 전체 서비스 env_file 파싱 → 미존재 파일은 ps -q 빈 문자열 유발
          cp config/crypto-engine.env.example config/crypto-engine.env
          cp config/api-gateway.env.example config/api-gateway.env
          cp config/dashboard.env.example config/dashboard.env

      - name: docker compose up (crypto-engine + db, --wait)
        # 인수조건 1: 컨테이너 실제 Limit이 .env 수치와 일치해야 healthy 도달 가능
        run: |
          docker compose --env-file .env up -d --wait --wait-timeout 120 crypto-engine db

      - name: Resource Limits 검증 (check-limits.sh)
        # 인수조건 1: .env 수치 불일치 → exit 1
        run: bash scripts/check-limits.sh .env

  # ── compose-integration (신규 — Step 1-D 커버) ─────────────
  compose-integration:
    name: crypto-engine + db 동시 healthy 확인
    runs-on: ubuntu-latest
    needs: build-and-trivy
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: crypto-engine 빌드 (GHA 캐시 히트, --load)
        uses: docker/build-push-action@v6
        with:
          context: ./crypto-engine
          load: true
          tags: pqc-security-project-crypto-engine:latest
          cache-from: type=gha

      - name: pqc-db:secure 빌드
        run: DOCKER_CONTENT_TRUST=0 docker build -t pqc-db:secure -f db/Dockerfile.db ./db

      - name: .env 생성
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=pqc_test/' .env
          # config/*.env: .gitignore(*.env)로 미추적 → example에서 복사
          # docker compose ps 시 전체 서비스 env_file 파싱 → 미존재 파일은 ps -q 빈 문자열 유발
          cp config/crypto-engine.env.example config/crypto-engine.env
          cp config/api-gateway.env.example config/api-gateway.env
          cp config/dashboard.env.example config/dashboard.env

      - name: docker compose up (crypto-engine + db, --wait)
        run: |
          docker compose --env-file .env up -d --wait --wait-timeout 120 crypto-engine db

      - name: crypto-engine + db healthy 확인
        # 인수조건 3: 두 서비스 동시 healthy
        run: |
          CE_STATUS=$(docker inspect $(docker compose ps -q crypto-engine) \
            --format '{{.State.Health.Status}}')
          DB_STATUS=$(docker inspect $(docker compose ps -q db) \
            --format '{{.State.Health.Status}}')
          echo "crypto-engine: ${CE_STATUS}"
          echo "db: ${DB_STATUS}"
          [ "$CE_STATUS" = "healthy" ] || { echo "FAIL: crypto-engine not healthy"; exit 1; }
          [ "$DB_STATUS" = "healthy" ] || { echo "FAIL: db not healthy"; exit 1; }
          echo "PASS ✓ — 두 서비스 모두 healthy"

  # ── api-gateway-build (Day 1 — 기존 잡과 독립 병렬) ─────
  api-gateway-build:
    name: api-gateway 빌드 + Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle wrapper 설치 및 캐시
        uses: gradle/actions/setup-gradle@v3

      - name: 단위 테스트 (./gradlew test)
        working-directory: api-gateway
        run: ./gradlew test --no-daemon

      - name: "[AC3b] JAR 빌드 (-x test, 캐시 히트 시 빠름)"
        working-directory: api-gateway
        run: ./gradlew build -x test --no-daemon -q

      - name: "[AC3b] http:// URL 기동 실패 검증 (java -jar, timeout 10s)"
        working-directory: api-gateway
        run: |
          OUTPUT=$(timeout 10 java \
            -Dcrypto.engine.url=http://bad-host:8000 \
            -Dauth.demo.user=demo \
            -Dauth.demo.password=demo123 \
            -jar build/libs/api-gateway-0.0.1-SNAPSHOT.jar 2>&1 || true)
          if echo "$OUTPUT" | grep -q "must use HTTPS"; then
            echo "PASS ✓ — http:// URL 기동 실패 확인"
          else
            echo "FAIL — 예상 메시지 미출력"
            echo "$OUTPUT" | tail -20
            exit 1
          fi

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: api-gateway Docker 빌드
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          load: true
          tags: api-gateway:ci

      - name: "[AC1·AC3a] api-gateway 컨테이너 기동 (dev 프로파일, 포트·검증 테스트용)"
        run: |
          docker run -d --name api-gateway-ci \
            -p 8080:8080 -p 8081:8081 \
            -e SPRING_PROFILES_ACTIVE=dev \
            -e CRYPTO_ENGINE_URL=http://nonexistent:8000 \
            -e DEMO_USER=demo \
            -e DEMO_PASSWORD=demo123 \
            api-gateway:ci

      - name: "[AC1·AC3a] 헬스체크 대기 (최대 60초)"
        run: |
          timeout 60 bash -c '
            until curl -sf http://localhost:8081/actuator/health > /dev/null 2>&1; do
              echo "대기 중..."; sleep 3
            done
            echo "api-gateway healthy ✓"
          '

      - name: "[AC1] test-gateway-ports — metrics 포트 분리 검증"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 \
            http://localhost:8080/actuator/metrics 2>/dev/null || echo "000")
          if [ "$CODE" = "000" ] || [ "$CODE" = "404" ]; then
            echo "PASS ✓ — 8080 actuator/metrics 차단 (응답코드: $CODE)"
          else
            echo "FAIL — 8080에서 actuator/metrics 접근 가능 (응답코드: $CODE)"
            exit 1
          fi
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/actuator/metrics)
          if [ "$CODE" = "200" ]; then
            echo "PASS ✓ — 8081 actuator/metrics 200 OK"
          else
            echo "FAIL — 8081 actuator/metrics 응답코드: $CODE"
            exit 1
          fi

      - name: "[AC3a] test-gateway-validation — 초과 크기 SignRequest → 400"
        run: |
          CODE=$(python3 -c "import json; print(json.dumps({'message':'A'*65537}))" \
            | curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8080/dsa/sign \
              -H "Content-Type: application/json" \
              -d @-)
          if [ "$CODE" = "400" ] || [ "$CODE" = "401" ]; then
            echo "PASS ✓ — 초과 크기 요청 ${CODE} 거부 확인 (JWT 미인증 또는 body 크기 초과)"
          else
            echo "FAIL — 응답코드: $CODE (400 또는 401 예상)"
            exit 1
          fi

      - name: Trivy CRITICAL 스캔
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: api-gateway:ci
          severity: CRITICAL
          exit-code: '1'
          format: table

  # ── auth-integration-test (Day 3 — JWT 발급 통합 검증) ──────
  auth-integration-test:
    name: JWT 발급 통합 테스트 (POST /api/auth/login)
    runs-on: ubuntu-latest
    needs: [build-and-trivy, api-gateway-build]
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: crypto-engine 빌드 (GHA 캐시 히트, --load)
        uses: docker/build-push-action@v6
        with:
          context: ./crypto-engine
          load: true
          tags: pqc-security-project-crypto-engine:latest
          cache-from: type=gha

      - name: crypto-engine 컨테이너 기동 (포트 8000 공개)
        run: |
          docker run -d --name crypto-engine \
            -p 8000:8000 \
            -e KEM_ALGORITHM_ID=ML-KEM-768 \
            -e DSA_ALGORITHM_ID=ML-DSA-65 \
            -e LOG_LEVEL=INFO \
            pqc-security-project-crypto-engine:latest

      - name: crypto-engine 헬스체크 대기 (최대 120초)
        run: |
          timeout 120 bash -c '
            until curl -sf http://localhost:8000/health > /dev/null 2>&1; do
              echo "crypto-engine 대기 중..."; sleep 5
            done
            echo "crypto-engine healthy ✓"
          '

      - name: Java 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle wrapper 캐시
        uses: gradle/actions/setup-gradle@v3

      - name: api-gateway JAR 빌드 (-x test)
        working-directory: api-gateway
        run: ./gradlew build -x test --no-daemon -q

      - name: api-gateway 기동 (java -jar, HTTP 허용)
        working-directory: api-gateway
        run: |
          java \
            -Dcrypto.engine.url=http://localhost:8000 \
            -Dcrypto.engine.allow-http=true \
            -Dauth.demo.user=demo \
            -Dauth.demo.password=demo123 \
            -jar build/libs/api-gateway-0.0.1-SNAPSHOT.jar &

      - name: api-gateway 헬스체크 대기 (최대 60초)
        run: |
          timeout 60 bash -c '
            until curl -sf http://localhost:8081/actuator/health > /dev/null 2>&1; do
              echo "api-gateway 대기 중..."; sleep 3
            done
            echo "api-gateway healthy ✓"
          '

      - name: "[AC1] POST /api/auth/login → 200 + JWT 구조 확인"
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"userId":"demo","password":"demo123"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          DOT_COUNT=$(echo "$TOKEN" | tr -cd '.' | wc -c)
          echo "token: ${TOKEN:0:40}... (dots: $DOT_COUNT)"
          [ "$DOT_COUNT" -eq 2 ] \
            && echo "PASS ✓ — JWT 200 + 구조(. 2개) 확인" \
            || { echo "FAIL — JWT 구조 불일치 (dots=$DOT_COUNT)"; exit 1; }
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: "[AC3b] JWT 검증 — Bearer /dsa/sign → 200"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/dsa/sign \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"message":"hello"}')
          if [ "$CODE" = "200" ]; then
            echo "PASS ✓ — 유효 JWT → /dsa/sign 200"
          else
            echo "FAIL — 응답코드: $CODE (200 예상)"
            exit 1
          fi

      - name: "[AC3b] JWT 검증 — 토큰 없이 /dsa/sign → 401"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/dsa/sign \
            -H "Content-Type: application/json" \
            -d '{"message":"hello"}')
          if [ "$CODE" = "401" ]; then
            echo "PASS ✓ — 토큰 없음 → /dsa/sign 401"
          else
            echo "FAIL — 응답코드: $CODE (401 예상)"
            exit 1
          fi

  # ── stack-integration-test (Day 5 — Week 3 통합 인수조건) ──
  stack-integration-test:
    name: 전체 스택 통합 (api-gateway + crypto-engine + db)
    runs-on: ubuntu-latest
    needs: [build-and-trivy, api-gateway-build]
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: crypto-engine 빌드 (GHA 캐시 히트, --load)
        uses: docker/build-push-action@v6
        with:
          context: ./crypto-engine
          load: true
          tags: pqc-security-project-crypto-engine:latest
          cache-from: type=gha

      - name: pqc-db:secure 빌드
        run: DOCKER_CONTENT_TRUST=0 docker build -t pqc-db:secure -f db/Dockerfile.db ./db

      - name: api-gateway Docker 빌드 (compose 이미지명으로 태깅)
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          load: true
          tags: pqc-security-project-api-gateway:latest

      - name: .env + config/*.env 생성 (DEMO 자격증명 주입)
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=pqc_test/' .env
          cp config/crypto-engine.env.example config/crypto-engine.env
          cp config/api-gateway.env.example config/api-gateway.env
          cp config/dashboard.env.example config/dashboard.env
          echo "DEMO_USER=demo" >> config/api-gateway.env
          echo "DEMO_PASSWORD=demo123" >> config/api-gateway.env

      - name: docker compose up (db + crypto-engine + api-gateway, --no-build --wait)
        run: |
          docker compose --env-file .env up -d --no-build --wait --wait-timeout 180 db crypto-engine api-gateway

      - name: "[AC2] api-gateway healthy 확인"
        run: |
          CID=$(docker compose ps -q api-gateway)
          [ -z "$CID" ] && { echo "FAIL: api-gateway 컨테이너 미존재"; exit 1; }
          STATUS=$(docker inspect "$CID" --format '{{.State.Health.Status}}')
          echo "api-gateway: ${STATUS}"
          [ "$STATUS" = "healthy" ] || { echo "FAIL: api-gateway not healthy"; exit 1; }
          echo "PASS ✓ — api-gateway healthy"

      - name: "[AC1] POST /api/auth/login → 200 + JWT 구조 확인"
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"userId":"demo","password":"demo123"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          DOT_COUNT=$(echo "$TOKEN" | tr -cd '.' | wc -c)
          echo "token dots: ${DOT_COUNT}"
          [ "$DOT_COUNT" -eq 2 ] \
            && echo "PASS ✓ — JWT 발급 200 + 구조(. 2개) 확인" \
            || { echo "FAIL — JWT 구조 불일치 (dots=${DOT_COUNT})"; exit 1; }
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: "[AC1-E2E] Bearer JWT → /dsa/sign 200"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/dsa/sign \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"message":"hello"}')
          [ "$CODE" = "200" ] \
            && echo "PASS ✓ — 유효 JWT → /dsa/sign 200" \
            || { echo "FAIL — 응답코드: $CODE (200 예상)"; exit 1; }

      - name: "[AC1-E2E] 미인증 → /dsa/sign 401"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/dsa/sign \
            -H "Content-Type: application/json" \
            -d '{"message":"hello"}')
          [ "$CODE" = "401" ] \
            && echo "PASS ✓ — 미인증 → /dsa/sign 401" \
            || { echo "FAIL — 응답코드: $CODE (401 예상)"; exit 1; }
