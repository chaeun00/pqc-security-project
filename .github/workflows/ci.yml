          RESP=$(curl -sf -X POST http://localhost:8080/api/encrypt \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"plaintext\":\"$PLAIN\"}")
          echo "$RESP"
          python3 -c "
          import json, sys
          r = json.loads('$RESP')
          assert r.get('algorithm') == 'ML-KEM-768', f'FAIL: algorithm={r.get(\"algorithm\")}'
          assert r.get('risk_level') == 'MEDIUM', f'FAIL: risk_level={r.get(\"risk_level\")}'
          print('PASS ✓ — risk_level 미전송 → ML-KEM-768 MEDIUM 폴백 확인')
          " || exit 1

      - name: "[Day10-AC2] CBOM risk_level=MEDIUM DB 검증"
        run: |
          docker compose exec -T db psql -U pqc -d pqc_db -t -c \
            "SELECT risk_level FROM cbom_assets WHERE algorithm_id='ML-KEM-768' AND asset->>'event'='encrypt' ORDER BY id DESC LIMIT 1;" \
            | grep -q "MEDIUM" && echo "PASS ✓ — cbom_assets.risk_level=MEDIUM 확인" || { echo "FAIL: cbom risk_level MEDIUM 없음"; exit 1; }

      - name: "[Day9-AC3] risk_level=LOW → algorithm: ML-KEM-512 + risk_level: LOW"
        run: |
          PLAIN=$(python3 -c "import base64; print(base64.b64encode(b'sndl-low-test').decode())")
          RESP=$(curl -sf -X POST http://localhost:8080/api/encrypt \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"plaintext\":\"$PLAIN\",\"risk_level\":\"LOW\"}")
          echo "$RESP"
          python3 -c "
          import json, sys
          r = json.loads('$RESP')
          assert r.get('algorithm') == 'ML-KEM-512', f'FAIL: algorithm={r.get(\"algorithm\")}'
          assert r.get('risk_level') == 'LOW', f'FAIL: risk_level={r.get(\"risk_level\")}'
          print('PASS ✓ — LOW → ML-KEM-512 + risk_level:LOW 확인')
          " || exit 1

      - name: "[Day10-AC3] CBOM risk_level=LOW DB 검증"
        run: |
          docker compose exec -T db psql -U pqc -d pqc_db -t -c \
            "SELECT risk_level FROM cbom_assets WHERE algorithm_id='ML-KEM-512' AND asset->>'event'='encrypt' ORDER BY id DESC LIMIT 1;" \
            | grep -q "LOW" && echo "PASS ✓ — cbom_assets.risk_level=LOW 확인" || { echo "FAIL: cbom risk_level LOW 없음"; exit 1; }

      - name: "[Day10] invalid risk_level → 400 검증"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8080/api/encrypt \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"plaintext":"dGVzdA==","risk_level":"SUPER"}')
          [ "$HTTP_CODE" -eq 400 ] \
            && echo "PASS ✓ — invalid risk_level → 400 확인" \
            || { echo "FAIL: expected 400, got $HTTP_CODE"; exit 1; }

      - name: 스택 종료
        if: always()
        run: docker compose down -v

  # ── algorithm-agility-test (Day 8 — AC1) ──────────────────
